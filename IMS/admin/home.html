<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="navbar-content"></div>

    <div class="container mt-4">
        <h2>Statistics Overview</h2>

        <!-- Example Stats Cards -->
        <div class="row">
            <div class="col-md-4">
                <div class="card text-white bg-primary mb-3">
                    <div class="card-header">Total Sales</div>
                    <div class="card-body">
                        <h5 class="card-title">$25,000</h5>
                        <p class="card-text">Sales from the last month.</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-white bg-success mb-3">
                    <div class="card-header">Active Users</div>
                    <div class="card-body">
                        <h5 class="card-title">1,200</h5>
                        <p class="card-text">Users currently active on the platform.</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-white bg-danger mb-3">
                    <div class="card-header">Pending Requests</div>
                    <div class="card-body">
                        <h5 class="card-title">50</h5>
                        <p class="card-text">Requests waiting for approval.</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Example Chart -->
        <div class="mt-4">
            <h3>Sales Overview (Last 6 Months)</h3>
            <canvas id="salesChart"></canvas>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script/script.js"></script>

</body>
</html>
